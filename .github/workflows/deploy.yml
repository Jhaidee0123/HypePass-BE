name: Deploy HypePass Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/HypePass-BE
            git checkout -- .
            git pull origin main
            yarn install --frozen-lockfile
            yarn build
            pm2 restart hypepass-api || pm2 start dist/src/main.js --name hypepass-api
            echo "Deploy completado!"
